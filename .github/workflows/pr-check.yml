name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Validate PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build check
        run: npm run build

      - name: Docker build check
        run: docker build -t openbusiness-pr-check .
